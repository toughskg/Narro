<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="720"
     viewBox="0 0 1600 720"
     role="img"
     aria-label="Narro icon mask preview">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9F9"/>
      <stop offset="1" stop-color="#EDF1F0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#007F7B"/>
      <stop offset="1" stop-color="#00958F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#172321" flood-opacity="0.16"/>
    </filter>
    <clipPath id="circle"><circle cx="0" cy="0" r="190"/></clipPath>
    <clipPath id="squircle"><rect x="-190" y="-190" width="380" height="380" rx="92"/></clipPath>
    <clipPath id="rounded"><rect x="-190" y="-190" width="380" height="380" rx="52"/></clipPath>
    <g id="mark" transform="scale(0.729)">
      <path d="M-105 -18 C-105 -79 -59 -114 0 -114 C59 -114 105 -79 105 -18"
            fill="none" stroke="url(#teal)" stroke-width="16" stroke-linecap="round"/>
      <rect x="-116" y="-25" width="21" height="52" rx="10.5" fill="url(#teal)"/>
      <rect x="-91" y="-42" width="14" height="84" rx="7" fill="url(#teal)"/>
      <rect x="77" y="-42" width="14" height="84" rx="7" fill="url(#teal)"/>
      <rect x="95" y="-25" width="21" height="52" rx="10.5" fill="url(#teal)"/>
      <path d="M-66 -65 H-28 L35 32 V-65 H70 V109 H35 L-28 12 V109 H-66 Z"
            fill="url(#teal)"/>
    </g>
  </defs>

  <rect width="1600" height="720" fill="url(#background)"/>
  <text x="800" y="74" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172321">
    Narro · Final Icon Candidate A
  </text>
  <text x="800" y="116" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="22" fill="#52615E">
    Google adaptive-icon safe zone · 108 dp layer · 66 dp artwork
  </text>

  <g transform="translate(310 370)" filter="url(#shadow)">
    <g clip-path="url(#circle)">
      <rect x="-190" y="-190" width="380" height="380" fill="#FFFFFF"/>
      <use href="#mark"/>
    </g>
  </g>
  <g transform="translate(800 370)" filter="url(#shadow)">
    <g clip-path="url(#squircle)">
      <rect x="-190" y="-190" width="380" height="380" fill="#FFFFFF"/>
      <use href="#mark"/>
    </g>
  </g>
  <g transform="translate(1290 370)" filter="url(#shadow)">
    <g clip-path="url(#rounded)">
      <rect x="-190" y="-190" width="380" height="380" fill="#FFFFFF"/>
      <use href="#mark"/>
    </g>
  </g>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="310" y="615" font-size="26" font-weight="700" fill="#172321">Circle</text>
    <text x="800" y="615" font-size="26" font-weight="700" fill="#172321">Samsung-style</text>
    <text x="1290" y="615" font-size="26" font-weight="700" fill="#172321">Rounded square</text>
  </g>
</svg>
