<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#17201f" flood-opacity=".16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#17201f" flood-opacity=".12"/>
    </filter>
    <style>
      .ui { font-family: "Noto Sans KR", "Malgun Gothic", sans-serif; fill:#191c1c; }
      .title { font-size:34px; font-weight:700; }
      .section { font-size:18px; font-weight:700; fill:#006a65; }
      .row { font-size:21px; font-weight:650; }
      .body { font-size:18px; font-weight:400; fill:#3f4947; }
      .small { font-size:15px; font-weight:400; fill:#596360; }
      .button { font-size:20px; font-weight:700; }
      .caption { font-size:17px; font-weight:600; fill:#42504d; }
    </style>
  </defs>

  <rect width="1500" height="1120" fill="#f4f7f6"/>
  <text x="70" y="65" class="ui title" fill="#006a65">Narro 설정 · 응원 화면 시안</text>
  <text x="70" y="98" class="ui body">순수 응원 · Ko-fi 외부 결제 · $1 / $2 / $3 · 별도 기능이나 혜택 없음</text>

  <!-- Phone 1: Settings -->
  <g transform="translate(70 135)" filter="url(#shadow)">
    <rect width="410" height="900" rx="34" fill="#ffffff" stroke="#dfe5e3" stroke-width="2"/>
    <rect x="170" y="12" width="70" height="6" rx="3" fill="#c5cdca"/>
    <text x="28" y="68" class="ui" font-size="30">‹</text>
    <text x="72" y="68" class="ui title">설정</text>
    <line x1="0" y1="94" x2="410" y2="94" stroke="#edf1f0"/>

    <text x="28" y="139" class="ui section">읽기</text>
    <text x="28" y="178" class="ui row">읽기 속도</text>
    <text x="345" y="178" class="ui body" text-anchor="end">1.0배</text>
    <line x1="28" y1="211" x2="382" y2="211" stroke="#008f87" stroke-width="8" stroke-linecap="round"/>
    <circle cx="205" cy="211" r="13" fill="#008f87"/>

    <text x="28" y="265" class="ui section">보안</text>
    <text x="28" y="304" class="ui row">앱 잠금</text>
    <text x="28" y="331" class="ui small">Narro를 열 때 4자리 PIN을 확인합니다.</text>
    <rect x="325" y="286" width="57" height="32" rx="16" fill="#008f87"/>
    <circle cx="365" cy="302" r="12" fill="#ffffff"/>
    <text x="28" y="380" class="ui row">생체인증 잠금 해제</text>
    <text x="28" y="407" class="ui small">지문 또는 기기 인증을 사용합니다.</text>
    <rect x="325" y="362" width="57" height="32" rx="16" fill="#008f87"/>
    <circle cx="365" cy="378" r="12" fill="#ffffff"/>

    <text x="28" y="464" class="ui section">언어 및 데이터</text>
    <text x="28" y="505" class="ui row">앱 언어</text>
    <text x="28" y="532" class="ui small">휴대폰 언어 설정을 따릅니다.</text>
    <text x="373" y="514" class="ui body" text-anchor="end">›</text>

    <line x1="28" y1="568" x2="382" y2="568" stroke="#e3e9e7"/>
    <text x="28" y="615" class="ui section">정보 및 지원</text>
    <text x="28" y="657" class="ui row">앱 버전</text>
    <text x="373" y="657" class="ui body" text-anchor="end">0.1.0 (1)</text>

    <rect x="20" y="683" width="370" height="94" rx="18" fill="#e4f4f1"/>
    <circle cx="55" cy="728" r="20" fill="#008f87"/>
    <text x="55" y="735" class="ui" font-size="21" font-weight="700" style="fill:#ffffff" text-anchor="middle">♥</text>
    <text x="88" y="719" class="ui row">Narro 응원하기</text>
    <text x="88" y="747" class="ui small">개발과 유지보수를 응원합니다.</text>
    <text x="368" y="737" class="ui body" text-anchor="end">›</text>

    <text x="28" y="823" class="ui row">개인정보처리방침</text>
    <text x="373" y="823" class="ui body" text-anchor="end">›</text>
    <text x="28" y="866" class="ui row">오픈소스 라이선스</text>
    <text x="373" y="866" class="ui body" text-anchor="end">›</text>
  </g>

  <!-- Phone 2: Support options -->
  <g transform="translate(545 135)" filter="url(#shadow)">
    <rect width="410" height="900" rx="34" fill="#ffffff" stroke="#dfe5e3" stroke-width="2"/>
    <rect x="170" y="12" width="70" height="6" rx="3" fill="#c5cdca"/>
    <text x="28" y="68" class="ui" font-size="30">‹</text>
    <text x="72" y="68" class="ui title">Narro 응원하기</text>
    <line x1="0" y1="94" x2="410" y2="94" stroke="#edf1f0"/>

    <circle cx="205" cy="168" r="48" fill="#e1f5f2"/>
    <text x="205" y="181" class="ui" font-size="42" style="fill:#008f87" text-anchor="middle">♥</text>
    <text x="205" y="244" class="ui" font-size="24" font-weight="700" text-anchor="middle">Narro를 응원해 주세요</text>
    <text x="205" y="281" class="ui body" text-anchor="middle">여러분의 응원은 앱 개발과</text>
    <text x="205" y="307" class="ui body" text-anchor="middle">유지보수에 큰 힘이 됩니다.</text>

    <rect x="28" y="347" width="354" height="82" rx="18" fill="#ffffff" stroke="#b9c7c4" stroke-width="2"/>
    <text x="54" y="382" class="ui row">가볍게 응원하기</text>
    <text x="54" y="407" class="ui small">작지만 소중한 응원</text>
    <text x="354" y="397" class="ui" font-size="26" font-weight="700" fill="#006a65" text-anchor="end">$1</text>

    <rect x="28" y="447" width="354" height="82" rx="18" fill="#ffffff" stroke="#b9c7c4" stroke-width="2"/>
    <text x="54" y="482" class="ui row">따뜻하게 응원하기</text>
    <text x="54" y="507" class="ui small">조금 더 따뜻한 응원</text>
    <text x="354" y="497" class="ui" font-size="26" font-weight="700" fill="#006a65" text-anchor="end">$2</text>

    <rect x="28" y="547" width="354" height="82" rx="18" fill="#008f87"/>
    <text x="54" y="582" class="ui row" style="fill:#ffffff">힘차게 응원하기</text>
    <text x="54" y="607" class="ui small" style="fill:#dff7f3">Narro에 힘을 보태는 응원</text>
    <text x="354" y="597" class="ui" font-size="26" font-weight="700" style="fill:#ffffff" text-anchor="end">$3</text>

    <rect x="28" y="666" width="354" height="128" rx="18" fill="#f1f5f4"/>
    <text x="49" y="699" class="ui small">• 응원 여부와 관계없이 모든 기능은 같습니다.</text>
    <text x="49" y="731" class="ui small">• 별도의 기능이나 디지털 혜택은 제공되지 않습니다.</text>
    <text x="49" y="763" class="ui small">• 결제는 Ko-fi의 외부 페이지에서 진행됩니다.</text>

    <text x="205" y="838" class="ui small" text-anchor="middle">결제대행 및 환전 수수료가 발생할 수 있습니다.</text>
    <text x="205" y="868" class="ui small" fill="#008f87" text-anchor="middle">후원은 언제든 선택할 수 있습니다.</text>
  </g>

  <!-- Phone 3: Confirmation -->
  <g transform="translate(1020 135)" filter="url(#shadow)">
    <rect width="410" height="900" rx="34" fill="#ffffff" stroke="#dfe5e3" stroke-width="2"/>
    <rect x="170" y="12" width="70" height="6" rx="3" fill="#c5cdca"/>
    <text x="28" y="68" class="ui" font-size="30">‹</text>
    <text x="72" y="68" class="ui title">Narro 응원하기</text>
    <line x1="0" y1="94" x2="410" y2="94" stroke="#edf1f0"/>

    <circle cx="205" cy="168" r="48" fill="#e1f5f2"/>
    <text x="205" y="181" class="ui" font-size="42" style="fill:#008f87" text-anchor="middle">♥</text>
    <text x="205" y="244" class="ui" font-size="24" font-weight="700" text-anchor="middle">Narro를 응원해 주세요</text>
    <rect x="28" y="347" width="354" height="82" rx="18" fill="#ffffff" stroke="#b9c7c4" stroke-width="2"/>
    <rect x="28" y="447" width="354" height="82" rx="18" fill="#ffffff" stroke="#b9c7c4" stroke-width="2"/>
    <rect x="28" y="547" width="354" height="82" rx="18" fill="#008f87"/>

    <rect width="410" height="900" rx="34" fill="#000000" opacity=".34"/>
    <g transform="translate(32 305)" filter="url(#soft)">
      <rect width="346" height="290" rx="28" fill="#ffffff"/>
      <text x="28" y="52" class="ui" font-size="24" font-weight="700">Ko-fi에서 응원하기</text>
      <text x="28" y="93" class="ui body">$3으로 Narro를 응원하시겠습니까?</text>
      <text x="28" y="131" class="ui small">계속하면 Ko-fi 외부 페이지가 열립니다.</text>
      <text x="28" y="159" class="ui small">Narro는 결제정보를 저장하지 않습니다.</text>
      <line x1="0" y1="199" x2="346" y2="199" stroke="#e4e9e7"/>
      <text x="98" y="250" class="ui button" fill="#46514f" text-anchor="middle">취소</text>
      <line x1="173" y1="199" x2="173" y2="290" stroke="#e4e9e7"/>
      <text x="258" y="250" class="ui button" fill="#008f87" text-anchor="middle">Ko-fi로 이동</text>
    </g>
  </g>

  <text x="275" y="1080" class="ui caption" text-anchor="middle">1. 설정에서 진입</text>
  <text x="750" y="1080" class="ui caption" text-anchor="middle">2. 응원 금액 선택</text>
  <text x="1225" y="1080" class="ui caption" text-anchor="middle">3. 사용자 확인 후 외부 이동</text>
</svg>
